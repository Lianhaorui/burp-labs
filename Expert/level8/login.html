<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户登录</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .login-container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); width: 300px; }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; color: #555; font-weight: bold; }
    input[type="text"], input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    input[type="submit"] { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    input[type="submit"]:hover { background-color: #45a049; }
    
    .links { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
    .action-btn { 
        display: block; 
        width: 100%; 
        padding: 8px 0; 
        text-align: center; 
        border-radius: 6px; 
        text-decoration: none; 
        font-size: 14px;
        box-sizing: border-box;
    }
    
    .forgot-btn { 
        background-color: #fff; 
        color: #1a73e8; 
        border: 1px solid #1a73e8;
    }
    .forgot-btn:hover { 
        background-color: #e8f0fe; 
    }

    .email-btn { 
        background-color: #fff; 
        color: #e67e22; 
        border: 1px solid #e67e22;
    }
    .email-btn:hover { 
        background-color: #fff5e6; 
    }

    .home-btn { 
        background-color: #4CAF50; 
        color: #fff; 
        border: 1px solid #4CAF50;
        box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .home-btn:hover { 
        background-color: #45a049; 
        border-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>User Login</h2>
    <form action="login.php" method="POST">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <input type="submit" value="Login">
    </form>
    <div class="links">
      <a class="action-btn forgot-btn" href="forgot-password.html">Forgot Password?</a>
    </div>
  </div>
</body>
</html>
